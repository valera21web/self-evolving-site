
services:
  app:
    build:
      context: .
      args:
        TARGETARCH: amd64
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=tech-pulse-agent
      # Git workflow (optional — if not set, local git init is used)
      # - GIT_REPO_URL=https://github.com/user/repo.git
      # - GIT_BRANCH=main
      # Auth for private repos (pick one):
      # - GIT_TOKEN=ghp_xxxxx
      # - GIT_SSH_KEY=<raw SSH private key content>
      # - GIT_SSH_KEY_PATH=/run/secrets/ssh_key
      # - GIT_USER_NAME=Tech Pulse Agent
      # - GIT_USER_EMAIL=agent@techpulse.local
    volumes:
      - news-data:/app/src/data
      - frontend-src:/app/src/frontend
      - sessions-data:/app/sessions
      - agent-logs:/var/log
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - agent-logs:/logs:ro
    depends_on:
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_DISABLE_SIGNOUT_MENU=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/json/agent-logs.json
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

volumes:
  news-data:
  frontend-src:
  sessions-data:
  agent-logs:
  tempo-data:
  loki-data:
  grafana-data:
